<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Pack Guys — 40' shipping container favicon">
  <title>The Pack Guys</title>
  <!-- Background cream square (gives the favicon a defined shape at tab scale) -->
  <rect x="2" y="2" width="60" height="60" fill="#F2E5D0" stroke="#062F37" stroke-width="3"/>
  <!-- Container body — simplified for favicon scale -->
  <rect x="8" y="20" width="48" height="24" fill="#F2E5D0" stroke="#062F37" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Top + bottom coral cargo-line stripes -->
  <rect x="10" y="22" width="44" height="1.5" fill="#FF6F61"/>
  <rect x="10" y="40.5" width="44" height="1.5" fill="#FF6F61"/>
  <!-- Corrugation ribs (vertical) -->
  <line x1="16" y1="24" x2="16" y2="40" stroke="#062F37" stroke-width="1" opacity="0.55"/>
  <line x1="22" y1="24" x2="22" y2="40" stroke="#062F37" stroke-width="1" opacity="0.55"/>
  <line x1="42" y1="24" x2="42" y2="40" stroke="#062F37" stroke-width="1" opacity="0.55"/>
  <line x1="48" y1="24" x2="48" y2="40" stroke="#062F37" stroke-width="1" opacity="0.55"/>
  <!-- Central coral asterisk (Pack Guys mark) -->
  <text x="32" y="37" font-family="JetBrains Mono, IBM Plex Mono, monospace" font-weight="700" font-size="14" fill="#FF6F61" text-anchor="middle">✱</text>
  <!-- Corner castings -->
  <rect x="7" y="19" width="3" height="2" fill="#062F37"/>
  <rect x="54" y="19" width="3" height="2" fill="#062F37"/>
  <rect x="7" y="43" width="3" height="2" fill="#062F37"/>
  <rect x="54" y="43" width="3" height="2" fill="#062F37"/>
</svg>
