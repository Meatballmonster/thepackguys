<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" role="img" aria-label="Preroll tube illustration">
  <title>Pack Guys preroll tube outline</title>
  <defs>
    <style>
      .tube-stroke { fill: none; stroke: #1E3A8A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .tube-stroke-thin { fill: none; stroke: #1E3A8A; stroke-width: 1.8; stroke-linecap: round; }
      .tube-accent { fill: none; stroke: #E6357A; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .tube-fill-cobalt { fill: #1E3A8A; }
      .tube-fill-cream { fill: #F2E8D5; }
      .tube-text { font-family: 'Cooper Black Italic','Cooper Black',Georgia,serif; font-style: italic; font-weight: 900; font-size: 14px; fill: #E6357A; letter-spacing: 0.5px; }
      .tube-mono { font-family: 'JetBrains Mono','Courier New',monospace; font-size: 7px; fill: #1E3A8A; letter-spacing: 1px; font-weight: 700; }
    </style>
  </defs>
  <!-- Cap -->
  <rect x="55" y="20" width="90" height="46" rx="6" class="tube-stroke tube-fill-cream"/>
  <line x1="55" y1="36" x2="145" y2="36" class="tube-stroke-thin"/>
  <!-- Cap arrow indicator -->
  <path d="M 80 50 L 100 50 L 95 45 M 100 50 L 95 55" class="tube-accent"/>
  <text x="100" y="32" text-anchor="middle" class="tube-mono">PUSH &amp; TURN</text>
  <!-- Neck/shoulder -->
  <path d="M 55 66 L 50 80 L 50 350 L 55 364" class="tube-stroke tube-fill-cream"/>
  <path d="M 145 66 L 150 80 L 150 350 L 145 364" class="tube-stroke tube-fill-cream"/>
  <line x1="55" y1="66" x2="145" y2="66" class="tube-stroke"/>
  <!-- Body -->
  <line x1="55" y1="364" x2="145" y2="364" class="tube-stroke"/>
  <!-- Label band -->
  <rect x="50" y="170" width="100" height="90" class="tube-fill-cream" stroke="#1E3A8A" stroke-width="2"/>
  <line x1="50" y1="184" x2="150" y2="184" class="tube-stroke-thin"/>
  <line x1="50" y1="246" x2="150" y2="246" class="tube-stroke-thin"/>
  <text x="100" y="180" text-anchor="middle" class="tube-mono">★ THE ★</text>
  <text x="78" y="215" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="22" fill="#1E3A8A" letter-spacing="-1">P</text>
  <text x="93" y="215" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="22" fill="#E6357A" letter-spacing="-1">G</text>
  <text x="110" y="215" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="14" fill="#1E3A8A" letter-spacing="-0.5">·Pack Guys</text>
  <!-- Triple motion lines on label -->
  <line x1="65" y1="225" x2="135" y2="225" stroke="#1E3A8A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="231" x2="130" y2="231" stroke="#1E3A8A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="237" x2="120" y2="237" stroke="#1E3A8A" stroke-width="1.5" stroke-linecap="round"/>
  <text x="100" y="257" text-anchor="middle" class="tube-mono">116MM · CR</text>
  <!-- Base -->
  <ellipse cx="100" cy="364" rx="45" ry="6" class="tube-fill-cobalt"/>
  <!-- Motion lines outside (right) suggesting freshness -->
  <line x1="160" y1="100" x2="178" y2="100" class="tube-stroke-thin"/>
  <line x1="160" y1="110" x2="172" y2="110" class="tube-stroke-thin"/>
  <line x1="160" y1="120" x2="168" y2="120" class="tube-stroke-thin"/>
</svg>
