<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 480" role="img" aria-label="116mm preroll tube outline">
  <title>Pack Guys 116mm preroll tube outline</title>
  <defs>
    <style>
      .tube-line { fill: none; stroke: #1E3A8A; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .tube-line-fine { fill: none; stroke: #1E3A8A; stroke-width: 1.4; stroke-linecap: round; }
      .tube-paper { fill: #F2E8D5; }
      .tube-fill-cobalt { fill: #1E3A8A; }
    </style>
  </defs>

  <!-- CAP (child-resistant push-and-turn) -->
  <!-- Slightly wider than body to suggest the lip/cap-on-rim look -->
  <rect x="22" y="14" width="76" height="58" rx="5" ry="5" class="tube-paper tube-line"/>
  <!-- CR mechanism arrow indicators (small magenta marks on cap) -->
  <circle cx="40" cy="43" r="2" fill="#E6357A"/>
  <circle cx="60" cy="43" r="2" fill="#E6357A"/>
  <circle cx="80" cy="43" r="2" fill="#E6357A"/>
  <!-- Cap rim line -->
  <line x1="22" y1="62" x2="98" y2="62" class="tube-line-fine"/>

  <!-- SHOULDER (cap meets body) -->
  <path d="M 22 72 L 28 84 L 28 446" class="tube-line tube-paper"/>
  <path d="M 98 72 L 92 84 L 92 446" class="tube-line tube-paper"/>
  <!-- Top of shoulder rim -->
  <line x1="28" y1="84" x2="92" y2="84" class="tube-line-fine"/>

  <!-- BODY (the tube itself) -->
  <!-- Body is x=28 to x=92 (64 wide) and y=84 to y=446 (362 tall) = 5.66:1 ratio - matches real preroll -->

  <!-- LABEL BAND (centered on body, ~25% of body height) -->
  <rect x="28" y="180" width="64" height="120" class="tube-paper tube-line"/>
  <!-- Label top + bottom borders -->
  <line x1="28" y1="194" x2="92" y2="194" class="tube-line-fine"/>
  <line x1="28" y1="286" x2="92" y2="286" class="tube-line-fine"/>

  <!-- ★ THE ★ small text top -->
  <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5.5" font-weight="700" fill="#1E3A8A" letter-spacing="0.5">★ THE ★</text>

  <!-- PG monogram (the brand mark inside the label) -->
  <text x="42" y="232" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="26" fill="#1E3A8A" letter-spacing="-1.5">P</text>
  <text x="58" y="232" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="26" fill="#E6357A" letter-spacing="-1.5">G</text>

  <!-- "Pack Guys" wordmark mini under PG -->
  <text x="60" y="252" text-anchor="middle" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="11" fill="#E6357A" letter-spacing="-0.5">Pack Guys</text>

  <!-- Triple motion lines (brand identifier) -->
  <line x1="38" y1="262" x2="82" y2="262" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="268" x2="78" y2="268" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="274" x2="72" y2="274" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 116MM · CR text bottom -->
  <text x="60" y="282" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5" font-weight="700" fill="#1E3A8A" letter-spacing="0.8">116MM · CR</text>

  <!-- BASE -->
  <line x1="28" y1="446" x2="92" y2="446" class="tube-line"/>
  <ellipse cx="60" cy="450" rx="32" ry="5" class="tube-fill-cobalt"/>
</svg>
