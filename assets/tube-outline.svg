<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 480" role="img" aria-label="116mm hinged pop-top preroll tube outline">
  <title>Pack Guys 116mm hinged pop-top preroll tube</title>
  <defs>
    <style>
      .t-line { fill: none; stroke: #1E3A8A; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .t-fine { fill: none; stroke: #1E3A8A; stroke-width: 1.4; stroke-linecap: round; }
      .t-rib { fill: none; stroke: #1E3A8A; stroke-width: 1.1; stroke-linecap: round; }
      .t-paper { fill: #F2E8D5; }
      .t-cobalt { fill: #1E3A8A; }
    </style>
  </defs>

  <!-- HINGED POP-TOP CAP — FLAT top (matches real product) -->
  <!-- Cap: x=28 to x=92, y=18 (flat top) to y=58 (where it meets body) -->
  <!-- Tiny rounded corners at top so it's not razor-sharp -->
  <path d="M 28 58 L 28 22 Q 28 18 32 18 L 88 18 Q 92 18 92 22 L 92 58 Z" class="t-paper t-line"/>

  <!-- Hinge on LEFT side — small bump at cap/body junction (the living hinge) -->
  <path d="M 26 50 L 23 54 L 23 62 L 26 66" class="t-line t-paper"/>

  <!-- Cap-body seam (the snap line) -->
  <line x1="28" y1="58" x2="92" y2="58" stroke="#1E3A8A" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Lift-tab indicator on RIGHT side (magenta — the press-to-pop point) -->
  <path d="M 88 56 L 92 58 L 88 60" stroke="#E6357A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Vertical ribs at top of body interior (visible through clear plastic in real product) -->
  <g class="t-rib" opacity="0.55">
    <line x1="38" y1="64" x2="38" y2="92"/>
    <line x1="46" y1="64" x2="46" y2="92"/>
    <line x1="54" y1="64" x2="54" y2="92"/>
    <line x1="62" y1="64" x2="62" y2="92"/>
    <line x1="70" y1="64" x2="70" y2="92"/>
    <line x1="78" y1="64" x2="78" y2="92"/>
    <line x1="86" y1="64" x2="86" y2="92"/>
  </g>

  <!-- BODY — clean cylinder -->
  <line x1="28" y1="58" x2="28" y2="448" class="t-line"/>
  <line x1="92" y1="58" x2="92" y2="448" class="t-line"/>

  <!-- LABEL BAND -->
  <rect x="28" y="180" width="64" height="120" class="t-paper t-line"/>
  <line x1="28" y1="194" x2="92" y2="194" class="t-fine"/>
  <line x1="28" y1="286" x2="92" y2="286" class="t-fine"/>

  <!-- ★ THE ★ -->
  <text x="60" y="190" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5.5" font-weight="700" fill="#1E3A8A" letter-spacing="0.5">★ THE ★</text>

  <!-- PG monogram (italic Cooper) -->
  <text x="42" y="232" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="26" fill="#1E3A8A" letter-spacing="-1.5">P</text>
  <text x="58" y="232" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="26" fill="#E6357A" letter-spacing="-1.5">G</text>

  <!-- "Pack Guys" wordmark mini -->
  <text x="60" y="252" text-anchor="middle" font-family="Cooper Black Italic, Cooper Black, Georgia, serif" font-style="italic" font-weight="900" font-size="11" fill="#E6357A" letter-spacing="-0.5">Pack Guys</text>

  <!-- Triple motion lines -->
  <line x1="38" y1="262" x2="82" y2="262" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="268" x2="78" y2="268" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="274" x2="72" y2="274" stroke="#1E3A8A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- spec footer -->
  <text x="60" y="282" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5" font-weight="700" fill="#1E3A8A" letter-spacing="0.6">116MM · POP-TOP</text>

  <!-- BASE — flat with slight rounded outer edge -->
  <path d="M 28 448 Q 28 458 60 458 Q 92 458 92 448" class="t-paper t-line"/>
  <ellipse cx="60" cy="456" rx="32" ry="3.5" class="t-cobalt"/>
</svg>
