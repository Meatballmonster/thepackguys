<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 480" role="img" aria-label="116mm squeeze pop-top preroll tube outline">
  <title>Pack Guys 116mm squeeze pop-top preroll tube</title>
  <defs>
    <style>
      .t-line { fill: none; stroke: #062F37; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .t-fine { fill: none; stroke: #062F37; stroke-width: 1.4; stroke-linecap: round; }
      .t-rib { fill: none; stroke: #062F37; stroke-width: 1.1; stroke-linecap: round; }
      .t-paper { fill: #F2E5D0; }
      .t-cobalt { fill: #062F37; }
      .t-magenta { fill: #FF6F61; }
    </style>
  </defs>

  <!-- SQUEEZE POP-TOP CAP — flat top, snap-on (no hinge, no twist) -->
  <!-- Cap sits as a rectangle on body: x=28-92, y=20 (flat top) to y=58 -->
  <!-- Tiny rounded top corners so it's not razor-sharp -->
  <path d="M 28 58 L 28 24 Q 28 20 32 20 L 88 20 Q 92 20 92 24 L 92 58 Z" class="t-paper t-line"/>

  <!-- Cap-body snap seam (the line where the cap meets body) -->
  <line x1="28" y1="58" x2="92" y2="58" stroke="#062F37" stroke-width="2.4" stroke-linecap="round"/>

  <!-- SQUEEZE POINTS — small inward chevrons on BOTH sides of cap -->
  <!-- showing where you press to pop the cap off -->
  <g stroke="#FF6F61" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left squeeze chevron -->
    <path d="M 23 36 L 27 39 L 23 42"/>
    <!-- Right squeeze chevron -->
    <path d="M 97 36 L 93 39 L 97 42"/>
  </g>

  <!-- Vertical ribs inside cap (small alignment grooves) -->
  <g class="t-rib" opacity="0.45">
    <line x1="40" y1="28" x2="40" y2="52"/>
    <line x1="50" y1="28" x2="50" y2="52"/>
    <line x1="60" y1="28" x2="60" y2="52"/>
    <line x1="70" y1="28" x2="70" y2="52"/>
    <line x1="80" y1="28" x2="80" y2="52"/>
  </g>

  <!-- BODY — clean dead-straight cylinder, same diameter as cap -->
  <line x1="28" y1="58" x2="28" y2="448" class="t-line"/>
  <line x1="92" y1="58" x2="92" y2="448" class="t-line"/>

  <!-- LABEL BAND -->
  <rect x="28" y="180" width="64" height="120" class="t-paper t-line"/>
  <line x1="28" y1="194" x2="92" y2="194" class="t-fine"/>
  <line x1="28" y1="286" x2="92" y2="286" class="t-fine"/>

  <text x="60" y="194" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5.5" font-weight="700" fill="#062F37" letter-spacing="0.5">✱ THE ✱</text>

  <!-- POP-TOP SEAL mini-medallion — simplified v9 mark, distilled to label scale.
       The seal is the brand mark: top-down view of the pop-top cap.
       Composition translated from assets/seal-pop-top.svg (400×440):
         · cap silhouette (cream + teal outline)
         · hinge tab on top (visual link to v9)
         · cream medallion at center holding coral ✱
       Rim credential text + inner TPG square stripped — unreadable at this scale per Bantjes. -->
  <g transform="translate(60 238)">
    <!-- Hinge tab — small rectangle on top of the cap circle (the v9 signature) -->
    <rect x="-7" y="-25" width="14" height="4" fill="#F2E5D0" stroke="#062F37" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Cap silhouette (the top-down view of the pop-top) -->
    <circle cx="0" cy="0" r="20" fill="#F2E5D0" stroke="#062F37" stroke-width="1.8"/>
    <!-- Inner credential ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#062F37" stroke-width="0.7" opacity="0.5"/>
    <!-- Central cream medallion (the "press here" target) -->
    <circle cx="0" cy="0" r="8" fill="#F2E5D0" stroke="#062F37" stroke-width="0.7"/>
    <!-- Coral ✱ — the brand mark, dead-center -->
    <text x="0" y="3.5" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="11" font-weight="700" fill="#FF6F61">✱</text>
  </g>

  <!-- PACK GUYS wordmark — small caption below the seal, reads at catalog-card scale -->
  <text x="60" y="278" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="4.6" font-weight="700" fill="#062F37" letter-spacing="0.8">PACK GUYS</text>

  <text x="60" y="284" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace" font-size="5.5" font-weight="700" fill="#062F37" letter-spacing="1">✱ 116MM ✱</text>

  <!-- BASE — flat with subtle rounded outer edge -->
  <path d="M 28 448 Q 28 458 60 458 Q 92 458 92 448" class="t-paper t-line"/>
  <ellipse cx="60" cy="456" rx="32" ry="3.5" class="t-cobalt"/>
</svg>
