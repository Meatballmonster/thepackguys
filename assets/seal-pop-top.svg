<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" role="img" aria-label="The Pack Guys Pop-Top Seal — 116mm CR-Cert · ASTM D3475">
  <title>The Pack Guys — Pop-Top Seal</title>
  <desc>Pop-top pre-roll tube cap viewed from above. Hinge tab on top, TPG square badge nested in the center, curved rim credentials.</desc>

  <defs>
    <path id="rim-top-arc" d="M 80 222 A 122 132 0 0 1 320 222" fill="none"/>
    <path id="rim-bot-arc" d="M 320 222 A 122 132 0 0 1 80 222" fill="none"/>
  </defs>

  <!-- Cap + hinge tab as ONE continuous outline.
       Tab is 88 × 18 px (≈4.9:1 ratio — distinctly rectangular).
       Attaches at (156, 49) and (244, 49) — points computed to lie ON the ellipse perimeter
       (at x = 200 ± 44 px, ellipse 165 × 180 gives y ≈ 48.5 ≈ 49).
       Going clockwise: up the tab's left side, across the top, down the right side,
       then arc around the rest of the cap and back to start. Single path, no internal seam. -->
  <path d="
    M 156 49
    L 156 31
    L 244 31
    L 244 49
    A 165 180 0 1 1 156 49
    Z"
    fill="#F2E5D0" stroke="#062F37" stroke-width="9" stroke-linejoin="round"/>

  <!-- Horizontal seam line through the middle — where cap meets body. -->
  <line x1="48" y1="222" x2="352" y2="222" stroke="#062F37" stroke-width="2.5" opacity="0.5"/>

  <!-- Seam-embedded micro-caption: actual product dimensions (Ø × Length). -->
  <rect x="148" y="215" width="104" height="14" fill="#F2E5D0"/>
  <text x="200" y="226" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-weight="700" font-size="10" fill="#062F37" text-anchor="middle" letter-spacing="1.5">Ø 21 MM · 116 MM L</text>

  <!-- Curved rim text top arc — product spec credential -->
  <text font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-weight="600" font-size="13" fill="#062F37" letter-spacing="2.5">
    <textPath href="#rim-top-arc" startOffset="50%" text-anchor="middle">116 MM · CR-CERT · ASTM D3475</textPath>
  </text>

  <!-- Curved rim text bottom arc — product grammar (operator-meaningful) -->
  <text font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-weight="700" font-size="13" fill="#FF6F61" letter-spacing="2.5">
    <textPath href="#rim-bot-arc" startOffset="50%" text-anchor="middle">✱ POSTED PRICES ✱ NET-30 ✱ SAME DAY ✱</textPath>
  </text>

  <!-- Center: TPG. square badge NESTED inside the seal.
       Two marks, one composition: the cap holds the corporate signature. -->
  <g transform="translate(200 222)">
    <circle cx="0" cy="0" r="64" fill="#E0D2B5" stroke="#062F37" stroke-width="3"/>
    <rect x="-44" y="-44" width="88" height="88" fill="#F2E5D0" stroke="#062F37" stroke-width="6"/>
    <text x="-4" y="14" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-weight="700" font-size="34" fill="#062F37" text-anchor="middle" letter-spacing="-2">TPG</text>
    <circle cx="32" cy="22" r="5" fill="#FF6F61"/>
    <rect x="-30" y="32" width="60" height="3" fill="#FF6F61"/>
  </g>
</svg>
