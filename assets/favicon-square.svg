<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Pack Guys PG name-patch mark">
  <rect width="64" height="64" fill="#1E3A8A"/>
  <ellipse cx="32" cy="32" rx="28" ry="24" fill="#F2E8D5"/>
  <ellipse cx="32" cy="32" rx="30" ry="26" fill="none" stroke="#F2E8D5" stroke-width="1" stroke-dasharray="2.5 1.5 1.5 1.5"/>

  <!-- Compact PG ligature for small sizes; star omitted (illegible below 64px) -->
  <g transform="translate(32 39)">
    <g transform="translate(-15 0)">
      <text font-family="'Cooper Black Italic','Cooper Black',Georgia,serif"
            font-style="italic" font-weight="900" font-size="32" fill="#1E3A8A"
            letter-spacing="-5">PG</text>
    </g>
    <text x="13" y="-7" font-size="9" font-weight="900" fill="#E6357A"
          font-family="Georgia,serif" text-anchor="middle">★</text>
  </g>
</svg>
