<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Pack Guys PG name-patch mark">
  <!-- Square crop of the patch — for browser tabs where the oval would be too small -->
  <rect width="64" height="64" fill="#1E3A8A"/>
  <!-- Inner cream field, oval-shaped to keep patch character -->
  <ellipse cx="32" cy="32" rx="28" ry="24" fill="#F2E8D5"/>
  <!-- Chain-stitch border -->
  <ellipse cx="32" cy="32" rx="30" ry="26" fill="none" stroke="#F2E8D5" stroke-width="1" stroke-dasharray="2.5 1.5 1.5 1.5"/>

  <!-- Italic PG centered, no curved text (would be illegible at 32px) -->
  <text x="20" y="45" font-family="'Cooper Black Italic','Cooper Black',Georgia,serif"
        font-style="italic" font-weight="900" font-size="30" fill="#1E3A8A" letter-spacing="-1.5"
        text-anchor="middle">P</text>
  <text x="44" y="45" font-family="'Cooper Black Italic','Cooper Black',Georgia,serif"
        font-style="italic" font-weight="900" font-size="30" fill="#E6357A" letter-spacing="-1.5"
        text-anchor="middle">G</text>
</svg>
